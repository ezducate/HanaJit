name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[test]
      - name: Unit tests
        run: pytest -q
      - name: Demo smoke test (benchmarks, GPU emission, FPGA export)
        run: python examples/demo.py
        # 3.10/3.11 use the Python-dispatcher fallback path by design;
        # 3.12+ exercise the native vectorcall dispatcher.
